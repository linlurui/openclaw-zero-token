name: openclaw_client
description: OpenClaw cross-platform client - Control your devices with AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Network
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # UI Components
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  iconsax_flutter: ^1.0.0
  shimmer: ^3.0.0

  # Platform Features
  permission_handler: ^11.2.0
  flutter_local_notifications: ^16.3.0
  network_info_plus: ^5.0.2
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1
  connectivity_plus: ^5.0.2

  # Platform-Specific
  # macOS & Windows
  window_manager: ^0.3.8
  tray_manager: ^0.2.3
  local_notifier: ^0.1.5

  # Mobile
  camera: ^0.10.5+7
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  speech_to_text: ^6.6.0

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  uuid: ^4.3.1
  logging: ^1.2.0
  async: ^2.11.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
